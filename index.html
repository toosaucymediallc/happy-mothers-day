<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Happy Mother's Day!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #fef6f0 0%, #f8f0f8 50%, #f0e8f0 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Georgia', serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    padding: 12px;
  }
  .book {
    width: 100%;
    max-width: 400px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(139,110,142,0.15), 0 2px 12px rgba(0,0,0,0.06);
    overflow: hidden;
    border: 1px solid rgba(200,180,200,0.3);
    position: relative;
  }
  .page-container {
    transition: opacity 0.4s ease, transform 0.4s ease;
    opacity: 1;
    transform: scale(1);
  }
  .page-container.fading {
    opacity: 0;
    transform: scale(0.97);
  }
  .page-container svg { width: 100%; display: block; }
  .narration {
    padding: 16px 20px;
    background: linear-gradient(to bottom, rgba(255,255,255,0.95), rgba(248,240,248,0.98));
    border-top: 1px solid rgba(200,180,200,0.2);
    transition: opacity 0.4s ease;
  }
  .narration.fading { opacity: 0; }
  .narration p {
    font-size: 15px;
    line-height: 1.6;
    color: #6b5670;
    text-align: center;
    font-style: italic;
  }
  .nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 16px;
    background: rgba(248,244,248,0.8);
  }
  .nav-btn {
    background: none;
    border: none;
    font-size: 26px;
    color: #b89aac;
    cursor: pointer;
    padding: 4px 12px;
    border-radius: 8px;
    transition: color 0.2s;
    line-height: 1;
  }
  .nav-btn:disabled { color: #ddd; cursor: default; }
  .dots { display: flex; gap: 6px; align-items: center; }
  .dot {
    height: 7px;
    border-radius: 4px;
    background: #e0d4e0;
    transition: all 0.3s ease;
    cursor: pointer;
    width: 7px;
  }
  .dot.active { width: 20px; background: #c9b3d9; }
  .hint {
    margin-top: 12px;
    font-size: 12px;
    color: #b89aac;
    opacity: 0.7;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div class="book" id="book">
  <div class="page-container" id="pageContainer"></div>
  <div class="narration" id="narration"><p id="narrationText"></p></div>
  <div class="nav">
    <button class="nav-btn" id="prevBtn" onclick="goToPage(currentPage-1)">‹</button>
    <div class="dots" id="dots"></div>
    <button class="nav-btn" id="nextBtn" onclick="goToPage(currentPage+1)">›</button>
  </div>
</div>
<p class="hint">← swipe or tap arrows →</p>

<script>
// ─── SVG Helper Functions ───
function heartPath(x, y, size, color, opacity) {
  return `<path d="M${x},${y+3*size} C${x},${y+1.5*size} ${x-4*size},${y-2*size} ${x},${y-5*size*0.6} C${x+4*size},${y-2*size} ${x},${y+1.5*size} ${x},${y+3*size}" fill="${color}" opacity="${opacity}"/>`;
}

function lavenderSprig(x, y, lean) {
  let s = `<g transform="translate(${x},${y}) rotate(${lean})">`;
  s += `<line x1="0" y1="0" x2="0" y2="40" stroke="#7a9e6d" stroke-width="2"/>`;
  [5,10,15,20,25].forEach(py => {
    s += `<ellipse cx="-3" cy="${py}" rx="2.5" ry="4" fill="#b8a9d4" transform="rotate(-15,-3,${py})"/>`;
    s += `<ellipse cx="3" cy="${py}" rx="2.5" ry="4" fill="#b8a9d4" transform="rotate(15,3,${py})"/>`;
  });
  s += `</g>`;
  return s;
}

function balloon(x, y, color) {
  return `<g transform="translate(${x},${y})">
    <line x1="0" y1="32" x2="2" y2="65" stroke="#ccc" stroke-width="1"/>
    <ellipse cx="0" cy="18" rx="16" ry="20" fill="${color}" opacity="0.85"/>
    <ellipse cx="-5" cy="12" rx="4" ry="6" fill="white" opacity="0.25"/>
    <path d="M-3,37 Q0,40 3,37" fill="${color}" opacity="0.85"/>
  </g>`;
}

function flowerBouquet(x, y, scale) {
  let s = `<g transform="translate(${x},${y}) scale(${scale})">`;
  s += `<path d="M-25,20 L0,60 L25,20" fill="#e8c4d8" stroke="#d4a0c0" stroke-width="1.5"/>`;
  s += `<path d="M-20,25 L0,55 L20,25" fill="#f0d4e4"/>`;
  s += `<ellipse cx="0" cy="58" rx="8" ry="4" fill="#c490b0"/>`;
  s += `<line x1="-8" y1="20" x2="-12" y2="-10" stroke="#7a9e6d" stroke-width="2.5"/>`;
  s += `<line x1="0" y1="20" x2="0" y2="-15" stroke="#7a9e6d" stroke-width="2.5"/>`;
  s += `<line x1="8" y1="20" x2="10" y2="-8" stroke="#7a9e6d" stroke-width="2.5"/>`;
  s += `<line x1="-4" y1="20" x2="-6" y2="-5" stroke="#7a9e6d" stroke-width="2"/>`;
  s += `<line x1="4" y1="20" x2="7" y2="-12" stroke="#7a9e6d" stroke-width="2"/>`;
  s += `<ellipse cx="-14" cy="5" rx="6" ry="3" fill="#8fb87a" transform="rotate(-30,-14,5)"/>`;
  s += `<ellipse cx="12" cy="8" rx="6" ry="3" fill="#8fb87a" transform="rotate(25,12,8)"/>`;
  const flowers = [[-12,-14,'#f4b8c1'],[0,-20,'#c9b3d9'],[10,-12,'#f4b8c1'],[-6,-8,'#fdd9b5'],[7,-18,'#c9b3d9']];
  flowers.forEach(([fx,fy,color]) => {
    [0,60,120,180,240,300].forEach(angle => {
      const rad = angle * Math.PI / 180;
      const cx = fx + Math.cos(rad)*5;
      const cy = fy + Math.sin(rad)*5;
      s += `<ellipse cx="${cx}" cy="${cy}" rx="4" ry="3" fill="${color}" transform="rotate(${angle},${cx},${cy})"/>`;
    });
    s += `<circle cx="${fx}" cy="${fy}" r="3" fill="#ffeaa7"/>`;
  });
  s += `</g>`;
  return s;
}

function toddlerBoy(x, y, scale, holdingFlowers) {
  let s = `<g transform="translate(${x},${y}) scale(${scale})">`;
  s += `<rect x="-12" y="10" width="24" height="28" rx="8" fill="#a8d8ea"/>`;
  s += `<rect x="-10" y="36" width="8" height="14" rx="4" fill="#c9b99a"/>`;
  s += `<rect x="2" y="36" width="8" height="14" rx="4" fill="#c9b99a"/>`;
  s += `<ellipse cx="-6" cy="50" rx="6" ry="3.5" fill="#7a6e5d"/>`;
  s += `<ellipse cx="6" cy="50" rx="6" ry="3.5" fill="#7a6e5d"/>`;
  if (holdingFlowers) {
    s += `<rect x="-22" y="14" width="12" height="7" rx="3.5" fill="#fde8d0" transform="rotate(-20,-16,17)"/>`;
    s += `<rect x="10" y="12" width="12" height="7" rx="3.5" fill="#fde8d0" transform="rotate(-40,16,15)"/>`;
    s += flowerBouquet(-30, -20, 0.6);
  } else {
    s += `<rect x="-22" y="14" width="12" height="7" rx="3.5" fill="#fde8d0" transform="rotate(10,-16,17)"/>`;
    s += `<rect x="10" y="14" width="12" height="7" rx="3.5" fill="#fde8d0" transform="rotate(-10,16,17)"/>`;
  }
  s += `<circle cx="0" cy="-2" r="16" fill="#fde8d0"/>`;
  s += `<path d="M-16,-4 Q-16,-20 0,-20 Q16,-20 16,-4 Q14,-12 0,-12 Q-14,-12 -16,-4" fill="#2c2c2c"/>`;
  s += `<path d="M-12,-16 Q-8,-22 0,-22 Q8,-22 12,-16" fill="#2c2c2c"/>`;
  s += `<circle cx="-5" cy="-2" r="2.5" fill="#2c2c2c"/>`;
  s += `<circle cx="5" cy="-2" r="2.5" fill="#2c2c2c"/>`;
  s += `<circle cx="-4" cy="-3" r="0.8" fill="white"/>`;
  s += `<circle cx="6" cy="-3" r="0.8" fill="white"/>`;
  s += `<path d="M-4,4 Q0,9 4,4" fill="none" stroke="#2c2c2c" stroke-width="1.5" stroke-linecap="round"/>`;
  s += `<circle cx="-9" cy="2" r="3" fill="#f4b8c1" opacity="0.4"/>`;
  s += `<circle cx="9" cy="2" r="3" fill="#f4b8c1" opacity="0.4"/>`;
  s += `</g>`;
  return s;
}

function babyBoy(x, y, scale, sitting) {
  let s = `<g transform="translate(${x},${y}) scale(${scale})">`;
  const bodyY = sitting ? 18 : 15;
  const bodyRY = sitting ? 14 : 16;
  s += `<ellipse cx="0" cy="${bodyY}" rx="14" ry="${bodyRY}" fill="#d4e8d0"/>`;
  if (sitting) {
    s += `<ellipse cx="-8" cy="30" rx="6" ry="5" fill="#fde8d0"/>`;
    s += `<ellipse cx="8" cy="30" rx="6" ry="5" fill="#fde8d0"/>`;
  } else {
    s += `<rect x="-10" y="28" width="7" height="10" rx="3.5" fill="#fde8d0"/>`;
    s += `<rect x="3" y="28" width="7" height="10" rx="3.5" fill="#fde8d0"/>`;
  }
  s += `<ellipse cx="-16" cy="16" rx="5" ry="6" fill="#fde8d0"/>`;
  s += `<ellipse cx="16" cy="16" rx="5" ry="6" fill="#fde8d0"/>`;
  s += `<circle cx="0" cy="-4" r="15" fill="#fde8d0"/>`;
  s += `<path d="M-8,-18 Q-4,-24 0,-18 Q4,-24 8,-18" fill="#2c2c2c"/>`;
  s += `<path d="M-10,-16 Q-6,-22 -2,-16" fill="#2c2c2c"/>`;
  s += `<path d="M2,-16 Q6,-22 10,-16" fill="#2c2c2c"/>`;
  s += `<circle cx="-4" cy="-4" r="2.5" fill="#2c2c2c"/>`;
  s += `<circle cx="4" cy="-4" r="2.5" fill="#2c2c2c"/>`;
  s += `<circle cx="-3" cy="-5" r="0.8" fill="white"/>`;
  s += `<circle cx="5" cy="-5" r="0.8" fill="white"/>`;
  s += `<path d="M-5,2 Q0,8 5,2" fill="none" stroke="#2c2c2c" stroke-width="1.5" stroke-linecap="round"/>`;
  s += `<circle cx="-9" cy="0" r="3.5" fill="#f4b8c1" opacity="0.45"/>`;
  s += `<circle cx="9" cy="0" r="3.5" fill="#f4b8c1" opacity="0.45"/>`;
  s += `</g>`;
  return s;
}

function dad(x, y, scale, apron) {
  let s = `<g transform="translate(${x},${y}) scale(${scale})">`;
  s += `<rect x="-16" y="12" width="32" height="38" rx="10" fill="#6b8ea8"/>`;
  if (apron) {
    s += `<rect x="-12" y="18" width="24" height="30" rx="4" fill="#e8ddd0"/>`;
    s += `<line x1="-12" y1="18" x2="-8" y2="8" stroke="#e8ddd0" stroke-width="3"/>`;
    s += `<line x1="12" y1="18" x2="8" y2="8" stroke="#e8ddd0" stroke-width="3"/>`;
  }
  s += `<rect x="-12" y="48" width="10" height="18" rx="5" fill="#8a7e70"/>`;
  s += `<rect x="2" y="48" width="10" height="18" rx="5" fill="#8a7e70"/>`;
  s += `<ellipse cx="-7" cy="66" rx="7" ry="4" fill="#5a5046"/>`;
  s += `<ellipse cx="7" cy="66" rx="7" ry="4" fill="#5a5046"/>`;
  s += `<rect x="-28" y="16" width="14" height="8" rx="4" fill="#fde8d0" transform="rotate(10,-21,20)"/>`;
  s += `<rect x="14" y="16" width="14" height="8" rx="4" fill="#fde8d0" transform="rotate(-10,21,20)"/>`;
  s += `<circle cx="0" cy="-4" r="18" fill="#fde8d0"/>`;
  s += `<path d="M-18,-6 Q-18,-24 0,-24 Q18,-24 18,-6 Q16,-16 0,-16 Q-16,-16 -18,-6" fill="#2c2c2c"/>`;
  s += `<circle cx="-6" cy="-4" r="2.5" fill="#2c2c2c"/>`;
  s += `<circle cx="6" cy="-4" r="2.5" fill="#2c2c2c"/>`;
  s += `<circle cx="-5" cy="-5" r="0.8" fill="white"/>`;
  s += `<circle cx="7" cy="-5" r="0.8" fill="white"/>`;
  s += `<path d="M-5,4 Q0,10 5,4" fill="none" stroke="#2c2c2c" stroke-width="1.8" stroke-linecap="round"/>`;
  s += `</g>`;
  return s;
}

function mom(x, y, scale) {
  let s = `<g transform="translate(${x},${y}) scale(${scale})">`;
  s += `<path d="M-14,14 L-18,55 Q0,58 18,55 L14,14 Q0,10 -14,14" fill="#e8c4d8"/>`;
  s += `<path d="M-14,14 Q0,18 14,14 Q0,10 -14,14" fill="#d4a0c0"/>`;
  s += `<circle cx="-5" cy="30" r="2" fill="#f0d4e4" opacity="0.6"/>`;
  s += `<circle cx="6" cy="35" r="1.5" fill="#c9b3d9" opacity="0.5"/>`;
  s += `<circle cx="-8" cy="42" r="1.8" fill="#f0d4e4" opacity="0.6"/>`;
  s += `<circle cx="3" cy="45" r="1.5" fill="#c9b3d9" opacity="0.5"/>`;
  s += `<rect x="-10" y="52" width="8" height="14" rx="4" fill="#fde8d0"/>`;
  s += `<rect x="2" y="52" width="8" height="14" rx="4" fill="#fde8d0"/>`;
  s += `<ellipse cx="-6" cy="66" rx="6" ry="3.5" fill="#d4a0c0"/>`;
  s += `<ellipse cx="6" cy="66" rx="6" ry="3.5" fill="#d4a0c0"/>`;
  s += `<rect x="-26" y="16" width="14" height="7" rx="3.5" fill="#fde8d0" transform="rotate(15,-19,19)"/>`;
  s += `<rect x="12" y="16" width="14" height="7" rx="3.5" fill="#fde8d0" transform="rotate(-15,19,19)"/>`;
  s += `<circle cx="0" cy="-4" r="17" fill="#fde8d0"/>`;
  s += `<path d="M-17,-6 Q-18,-24 0,-24 Q18,-24 17,-6" fill="#2c2c2c"/>`;
  s += `<path d="M-17,-2 Q-22,10 -18,30 Q-16,20 -14,12 L-17,-2" fill="#2c2c2c"/>`;
  s += `<path d="M17,-2 Q22,10 18,30 Q16,20 14,12 L17,-2" fill="#2c2c2c"/>`;
  s += `<circle cx="-5" cy="-4" r="2.5" fill="#2c2c2c"/>`;
  s += `<circle cx="5" cy="-4" r="2.5" fill="#2c2c2c"/>`;
  s += `<circle cx="-4" cy="-5" r="0.8" fill="white"/>`;
  s += `<circle cx="6" cy="-5" r="0.8" fill="white"/>`;
  s += `<line x1="-8" y1="-6" x2="-9" y2="-8" stroke="#2c2c2c" stroke-width="1"/>`;
  s += `<line x1="8" y1="-6" x2="9" y2="-8" stroke="#2c2c2c" stroke-width="1"/>`;
  s += `<path d="M-4,4 Q0,9 4,4" fill="none" stroke="#2c2c2c" stroke-width="1.5" stroke-linecap="round"/>`;
  s += `<circle cx="-9" cy="1" r="3" fill="#f4b8c1" opacity="0.4"/>`;
  s += `<circle cx="9" cy="1" r="3" fill="#f4b8c1" opacity="0.4"/>`;
  s += `</g>`;
  return s;
}

function goldenDoodle(x, y, scale, lying) {
  let s = `<g transform="translate(${x},${y}) scale(${scale})">`;
  if (lying) {
    s += `<ellipse cx="0" cy="10" rx="35" ry="14" fill="#deb96a"/>`;
    s += `<ellipse cx="0" cy="10" rx="30" ry="11" fill="#e8c97a"/>`;
    s += `<path d="M30,5 Q42,-5 38,5" fill="#deb96a" stroke="#deb96a" stroke-width="4" stroke-linecap="round"/>`;
    s += `<ellipse cx="-25" cy="22" rx="7" ry="5" fill="#e8c97a"/>`;
    s += `<ellipse cx="-12" cy="23" rx="6" ry="4" fill="#e8c97a"/>`;
    s += `<circle cx="-30" cy="-5" r="14" fill="#e8c97a"/>`;
    s += `<circle cx="-36" cy="-14" r="5" fill="#deb96a"/>`;
    s += `<circle cx="-28" cy="-16" r="5" fill="#deb96a"/>`;
    s += `<circle cx="-22" cy="-12" r="4" fill="#deb96a"/>`;
    s += `<ellipse cx="-42" cy="-2" rx="6" ry="9" fill="#c9a55a" transform="rotate(15,-42,-2)"/>`;
    s += `<ellipse cx="-20" cy="-2" rx="5" ry="8" fill="#c9a55a" transform="rotate(-10,-20,-2)"/>`;
    s += `<ellipse cx="-34" cy="0" rx="6" ry="4" fill="#fde8d0"/>`;
    s += `<ellipse cx="-35" cy="-2" rx="3" ry="2" fill="#3c3028"/>`;
    s += `<circle cx="-34" cy="-8" r="2" fill="#3c3028"/>`;
    s += `<circle cx="-26" cy="-7" r="2" fill="#3c3028"/>`;
    s += `<circle cx="-33.5" cy="-8.5" r="0.6" fill="white"/>`;
    s += `<circle cx="-25.5" cy="-7.5" r="0.6" fill="white"/>`;
    s += `<path d="M-36,3 Q-35,8 -33,3" fill="#f4a0a0"/>`;
  } else {
    s += `<ellipse cx="0" cy="18" rx="18" ry="22" fill="#e8c97a"/>`;
    s += `<path d="M14,20 Q28,10 24,20" fill="#deb96a" stroke="#deb96a" stroke-width="4" stroke-linecap="round"/>`;
    s += `<ellipse cx="-8" cy="38" rx="6" ry="4" fill="#e8c97a"/>`;
    s += `<ellipse cx="8" cy="38" rx="6" ry="4" fill="#e8c97a"/>`;
    s += `<circle cx="0" cy="-8" r="16" fill="#e8c97a"/>`;
    s += `<circle cx="-8" cy="-20" r="5" fill="#deb96a"/>`;
    s += `<circle cx="0" cy="-22" r="5" fill="#deb96a"/>`;
    s += `<circle cx="8" cy="-20" r="5" fill="#deb96a"/>`;
    s += `<ellipse cx="-16" cy="-4" rx="6" ry="10" fill="#c9a55a" transform="rotate(10,-16,-4)"/>`;
    s += `<ellipse cx="16" cy="-4" rx="6" ry="10" fill="#c9a55a" transform="rotate(-10,16,-4)"/>`;
    s += `<ellipse cx="0" cy="-2" rx="7" ry="5" fill="#fde8d0"/>`;
    s += `<ellipse cx="0" cy="-4" rx="3.5" ry="2.5" fill="#3c3028"/>`;
    s += `<circle cx="-6" cy="-10" r="2.5" fill="#3c3028"/>`;
    s += `<circle cx="6" cy="-10" r="2.5" fill="#3c3028"/>`;
    s += `<circle cx="-5.5" cy="-10.5" r="0.7" fill="white"/>`;
    s += `<circle cx="6.5" cy="-10.5" r="0.7" fill="white"/>`;
    s += `<path d="M-3,2 Q0,8 3,2" fill="#f4a0a0"/>`;
  }
  s += `</g>`;
  return s;
}

// ─── Page Builders ───
function page1() {
  return `<svg viewBox="0 0 380 520" xmlns="http://www.w3.org/2000/svg">
    <defs><radialGradient id="p1bg" cx="50%" cy="40%" r="60%"><stop offset="0%" stop-color="#fef6f0"/><stop offset="100%" stop-color="#f0e4f0"/></radialGradient></defs>
    <rect width="380" height="520" fill="url(#p1bg)"/>
    ${lavenderSprig(30,60,-15)}${lavenderSprig(50,80,-8)}
    ${lavenderSprig(330,60,15)}${lavenderSprig(350,80,8)}
    ${lavenderSprig(30,380,-20)}${lavenderSprig(350,380,20)}
    ${heartPath(80,120,2.5,'#f4b8c1',0.5)}
    ${heartPath(300,140,2,'#c9b3d9',0.4)}
    ${heartPath(60,350,1.8,'#f4b8c1',0.3)}
    ${heartPath(320,360,2.2,'#c9b3d9',0.4)}
    ${heartPath(190,100,3,'#f4b8c1',0.3)}
    ${flowerBouquet(190,220,1.8)}
    <text x="190" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="36" fill="#8b6e8e" font-weight="bold">Happy</text>
    <text x="190" y="415" text-anchor="middle" font-family="Georgia, serif" font-size="36" fill="#8b6e8e" font-weight="bold">Mother's Day!</text>
    <path d="M120,435 Q190,450 260,435" fill="none" stroke="#d4a0c0" stroke-width="2" opacity="0.6"/>
    ${heartPath(155,455,1.5,'#f4b8c1',0.6)}
    ${heartPath(190,450,2,'#c9b3d9',0.5)}
    ${heartPath(225,455,1.5,'#f4b8c1',0.6)}
  </svg>`;
}

function page2() {
  return `<svg viewBox="0 0 380 520" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="p2bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e8f4f8"/><stop offset="100%" stop-color="#f8f0f8"/></linearGradient></defs>
    <rect width="380" height="520" fill="url(#p2bg)"/>
    <rect x="0" y="360" width="380" height="160" fill="#f0e8e0"/>
    <rect x="0" y="356" width="380" height="8" fill="#e4d8cc" rx="2"/>
    <rect x="240" y="80" width="60" height="50" rx="3" fill="#fff" stroke="#d4c8bc" stroke-width="2"/>

// ─── Pages Data ───
const pages = [
  { svg: page1, narration: null },
  { svg: page2, narration: "Emerson and little Ellison love their mommy so much! Emerson picked the prettiest flowers just for her." },
  { svg: page3, narration: "Dad, Emerson, and baby Ellison are busy in the kitchen! They made a yummy omelette, fresh orange juice, and a colorful plate of fruits — all for Mommy!" },
  { svg: page4, narration: "The whole family gathers around the dining table, decorated with beautiful lavender flowers, balloons, and festive ribbons. What a special breakfast!" },
  { svg: page5, narration: "Mommy feels all the love! The whole family gives her the biggest, warmest hug on the couch. Even Rosey snuggles in. One happy family!" },
  { svg: page6, narration: null },
];

let currentPage = 0;
let isTransitioning = false;

const container = document.getElementById('pageContainer');
const narrationDiv = document.getElementById('narration');
const narrationText = document.getElementById('narrationText');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const dotsDiv = document.getElementById('dots');

// Build dots
pages.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.onclick = () => goToPage(i);
  dotsDiv.appendChild(dot);
});

function renderPage() {
  const page = pages[currentPage];
  container.innerHTML = page.svg();
  if (page.narration) {
    narrationDiv.style.display = 'block';
    narrationText.textContent = page.narration;
  } else {
    narrationDiv.style.display = 'none';
  }
  prevBtn.disabled = currentPage === 0;
  nextBtn.disabled = currentPage === pages.length - 1;
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.className = 'dot' + (i === currentPage ? ' active' : '');
  });
}

function goToPage(n) {
  if (isTransitioning || n < 0 || n >= pages.length || n === currentPage) return;
  isTransitioning = true;
  container.classList.add('fading');
  narrationDiv.classList.add('fading');
  setTimeout(() => {
    currentPage = n;
    renderPage();
    requestAnimationFrame(() => {
      container.classList.remove('fading');
      narrationDiv.classList.remove('fading');
      isTransitioning = false;
    });
  }, 400);
}

// Swipe support
let touchStartX = 0;
const book = document.getElementById('book');
book.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
book.addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].screenX;
  if (Math.abs(diff) > 50) {
    if (diff > 0) goToPage(currentPage + 1);
    else goToPage(currentPage - 1);
  }
}, { passive: true });

// Keyboard support
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') goToPage(currentPage + 1);
  if (e.key === 'ArrowLeft') goToPage(currentPage - 1);
});

// Initial render
renderPage();
</script>
